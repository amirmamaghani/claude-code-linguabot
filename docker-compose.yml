services:
  bot-amir:
    build: .
    restart: unless-stopped
    env_file: .env.bot-amir
    volumes:
      - /root/.claude/.credentials.json:/root/.claude/.credentials.json:ro
      - /opt/linguabot-db/bot-amir:/app/db
    tmpfs:
      - /tmp:size=512M

  bot-ru:
    build: .
    restart: unless-stopped
    env_file: .env.bot-ru
    volumes:
      - /root/.claude/.credentials.json:/root/.claude/.credentials.json:ro
      - /opt/linguabot-db/bot-ru:/app/db
    tmpfs:
      - /tmp:size=512M
