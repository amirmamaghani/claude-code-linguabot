id: ru-a1-05
module: A1
order: 5
title: "В магазине"
title_native: "V obchode"
description: "Nakupovanie, pýtanie sa na cenu, veľkosti"

objectives:
  - Opýtať sa koľko niečo stojí
  - Povedať čo hľadám
  - Základné nakupovanie

vocabulary:
