grammar:
  - concept: "Сколько стоит + predmet"
    explanation: "Сколько стоит это? (Koľko to stojí?) Сколько стоит кофе? (Koľko stojí káva?)"
  - concept: "Прилагательные — veľký/malý"
    explanation: "большой/маленький sa menia podľa rodu: большая сумка (veľká taška), большой магазин (veľký obchod)"

phrases:
  - native: "Koľko to stojí?"
    target: "Сколько это стоит?"
  - native: "Je to príliš drahé"
    target: "Это слишком дорого"
  - native: "Hľadám veľkosť M"
    target: "Я ищу размер М"
  - native: "Vezmem si toto"
    target: "Я возьму это"

phases:
  - mode: tutor
    instruction: "Uč nakupovanie — ceny, veľkosti, výber. Používaj reálne príklady z ruských obchodov."
  - mode: drills
    category: shopping
    instruction: "Nákupné situácie: pýtaj sa na cenu, vyberaj veľkosť, rozhoduj sa."
  - mode: tutor
    instruction: "Roleplay: na trhu v Rusku. Študent nakupuje suveníry, zmýšľa o cenách."

pass_score: 70
